<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>香港快閃導覽</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: rgba(255,255,255,0.08);
    --text: #f0ece4;
    --muted: #888;
    --accent: #e8c87a;
    --accent2: #7ab8e8;
    --red: #e87a7a;
    --green: #7ae8a8;
    --tag-food: rgba(232,138,122,0.15);
    --tag-food-t: #e88a7a;
    --tag-shop: rgba(122,184,232,0.15);
    --tag-shop-t: #7ab8e8;
    --tag-sight: rgba(122,232,168,0.15);
    --tag-sight-t: #7ae8a8;
    --tag-cafe: rgba(232,200,122,0.15);
    --tag-cafe-t: #e8c87a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,15,15,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    padding: 14px 16px 10px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .title { font-size: 18px; font-weight: 700; letter-spacing: 0.02em; }
  .title span { color: var(--accent); }

  .hotel-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--muted);
  }
  .hotel-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 6px 16px;
    border-radius: 999px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab.active {
    background: var(--accent);
    color: #0f0f0f;
    border-color: transparent;
    font-weight: 700;
  }

  /* Content */
  .content { padding: 16px; padding-bottom: 40px; }

  /* Section */
  .section { margin-bottom: 28px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .section-area {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .metro-tag {
    font-size: 11px;
    background: rgba(122,184,232,0.12);
    color: var(--accent2);
    border-radius: 4px;
    padding: 2px 8px;
    border: 0.5px solid rgba(122,184,232,0.2);
  }

  /* Cards grid */
  .cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    transition: transform 0.15s, background 0.15s;
    -webkit-user-select: none;
  }
  .card:active { transform: scale(0.97); background: var(--surface2); }

  .card-badge {
    display: inline-block;
    font-size: 10px;
    border-radius: 4px;
    padding: 2px 7px;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .badge-food { background: var(--tag-food); color: var(--tag-food-t); }
  .badge-shop { background: var(--tag-shop); color: var(--tag-shop-t); }
  .badge-sight { background: var(--tag-sight); color: var(--tag-sight-t); }
  .badge-cafe { background: var(--tag-cafe); color: var(--tag-cafe-t); }
  .badge-default { background: rgba(255,255,255,0.07); color: var(--muted); }

  .card-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .card-note { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

  /* Ranked list */
  .ranked-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .ranked-controls label { font-size: 13px; color: var(--muted); }
  .ranked-controls select {
    background: var(--surface);
    color: var(--text);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
  }

  .rank-list { display: flex; flex-direction: column; gap: 6px; }

  .rank-item {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background 0.15s;
  }
  .rank-item:active { background: var(--surface2); }

  .rank-num {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    min-width: 28px;
    text-align: center;
  }
  .rank-num.top3 { color: var(--accent); font-size: 15px; }

  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .rank-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .rank-stars { color: var(--accent); letter-spacing: -1px; }

  .rank-right { text-align: right; flex-shrink: 0; }
  .rank-price { font-size: 14px; font-weight: 700; color: var(--text); }
  .rank-unit { font-size: 10px; color: var(--muted); }

  .ranked-footer {
    margin-top: 16px;
    padding: 12px 14px;
    background: var(--surface);
    border-radius: 12px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    border: 0.5px solid var(--border);
  }
  .ranked-footer strong { color: var(--accent); }

  /* Tips section */
  .tips-list { display: flex; flex-direction: column; gap: 8px; }
  .tip-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .tip-icon {
    font-size: 20px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .tip-content {}
  .tip-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .tip-text { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .tip-highlight { color: var(--accent); font-weight: 500; }

  /* Empty */
  .empty { text-align: center; color: var(--muted); padding: 2rem 0; font-size: 14px; }

  /* Divider */
  .divider { height: 0.5px; background: var(--border); margin: 20px 0; }
</style>
</head>

function badgeClass(type) {
  const map = { food:'badge-food', shop:'badge-shop', sight:'badge-sight', cafe:'badge-cafe' };
  return map[type] || 'badge-default';
}

function starStr(n) {
  return '★'.repeat(n) + '☆'.repeat(5-n);
}

let currentSort = 'rank';

function renderArea(tab) {
  const list = tab === 'all' ? areas : areas.filter(a => a.area === tab);
  if (!list.length) { document.getElementById('content').innerHTML = '<div class="empty">沒有資料</div>'; return; }
  document.getElementById('content').innerHTML = list.map(s => `
    <div class="section">
      <div class="section-header">
        <div class="section-area">${s.area}</div>
        <div class="metro-tag">地鐵 ${s.metro}</div>
      </div>
      <div class="cards">
        ${s.items.map(item => `
          <div class="card">
            <div class="card-badge ${badgeClass(item.type)}">${item.label}</div>
            <div class="card-name">${item.name}</div>
            ${item.note ? `<div class="card-note">${item.note}</div>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function renderRanked() {
  let list = [...ranked];
  if (currentSort === 'stars-desc') list.sort((a,b) => b.stars - a.stars || a.rank - b.rank);
  else if (currentSort === 'price-asc') list.sort((a,b) => a.price - b.price);
  else if (currentSort === 'price-desc') list.sort((a,b) => b.price - a.price);
  else list.sort((a,b) => a.rank - b.rank);

  document.getElementById('content').innerHTML = `
    <div class="ranked-controls">
      <label>排序方式</label>
      <select id="sort-sel">
        <option value="rank" ${currentSort==='rank'?'selected':''}>依清單順序</option>
        <option value="stars-desc" ${currentSort==='stars-desc'?'selected':''}>星等高→低</option>
        <option value="price-asc" ${currentSort==='price-asc'?'selected':''}>價格低→高</option>
        <option value="price-desc" ${currentSort==='price-desc'?'selected':''}>價格高→低</option>
      </select>
    </div>
    <div class="rank-list">
      ${list.map(item => `
        <div class="rank-item">
          <div class="rank-num ${item.rank <= 3 ? 'top3' : ''}">#${item.rank}</div>
          <div class="rank-info">
            <div class="rank-name">${item.name}</div>

          </div>
          <div class="rank-right">
            <div class="rank-price">${item.price}</div>
            <div class="rank-unit">港幣</div>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="ranked-footer">21 間合計 <strong>2860 港元 ≈ 11,827 台幣</strong>（6 天）<br>兩天預算參考：<strong>1000–1500 港元</strong></div>
  `;

  document.getElementById('sort-sel').addEventListener('change', e => {
    currentSort = e.target.value;
    renderRanked();
  });
}

function renderTips() {
  document.getElementById('content').innerHTML = `
    <div class="tips-list">
      ${tips.map(t => `
        <div class="tip-card">
          <div class="tip-icon">${t.icon}</div>
          <div class="tip-content">
            <div class="tip-title">${t.title}</div>
            <div class="tip-text">${t.text}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

let currentTab = 'all';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  if (tab === 'ranked') renderRanked();
  else if (tab === 'tips') renderTips();
  else renderArea(tab);
}

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  switchTab(btn.dataset.tab);
});

switchTab('all');
</script>
</body>
</html>
